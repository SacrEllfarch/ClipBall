<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>剪贴板历史记录工具</title>
    <style>
        /* 全局重置与背景设定（模拟桌面环境） */
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=2564&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* ----- 毛玻璃通用样式 ----- */
        .glass {
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
        }

        /* ----- 悬浮球 (Inactive State) ----- */
        #floating-ball {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 1000;
            user-select: none;
        }

        #floating-ball:hover {
            transform: scale(1.1);
            background: rgba(255, 255, 255, 0.85);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.25);
        }

        /* ----- 历史面板 (Active State) ----- */
        #history-panel {
            position: fixed;
            bottom: 40px;
            right: 40px;
            width: 340px;
            height: 480px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            z-index: 1001;
            /* 动画与变形 */
            opacity: 0;
            transform: scale(0.8) translateY(20px);
            transform-origin: bottom right;
            pointer-events: none;
            transition: opacity 0.3s ease, transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            
            /* 允许用户通过右下角拖拽改变大小 */
            resize: both;
            overflow: hidden;
            min-width: 280px;
            min-height: 350px;
            max-width: 80vw;
            max-height: 90vh;
        }

        #history-panel.active {
            opacity: 1;
            transform: scale(1) translateY(0);
            pointer-events: auto;
        }

        /* --- 顶部控制栏 --- */
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.5);
            cursor: grab;
            user-select: none;
        }
        .panel-header:active {
            cursor: grabbing;
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
        }
        
        .search-input {
            border: none;
            background: rgba(0, 0, 0, 0.05);
            padding: 4px 10px;
            border-radius: 20px;
            outline: none;
            font-size: 13px;
            width: 120px;
            transition: width 0.3s;
        }
        .search-input:focus {
            width: 160px;
            background: rgba(255, 255, 255, 0.8);
        }

        .header-right {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .icon-btn {
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.2s, transform 0.2s;
            font-size: 14px;
        }
        .icon-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* --- 内容列表区 --- */
        .panel-content {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        /* 自定义滚动条 */
        .panel-content::-webkit-scrollbar {
            width: 6px;
        }
        .panel-content::-webkit-scrollbar-thumb {
            background-color: rgba(0,0,0,0.15);
            border-radius: 10px;
        }

        .history-item {
            display: flex;
            flex-direction: column;
            padding: 10px 12px;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.4);
            transition: background 0.2s;
            position: relative;
        }
        .history-item:hover {
            background: rgba(255, 255, 255, 0.8);
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
            font-size: 12px;
            color: #666;
        }

        .item-type {
            display: flex;
            align-items: center;
            gap: 4px;
            font-weight: 500;
        }

        .item-body {
            font-size: 13px;
            color: #333;
            word-break: break-all;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .item-image-preview {
            width: 100%;
            height: 60px;
            background: #eee;
            border-radius: 4px;
            margin-top: 4px;
            border: 1px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            color: #999;
        }

        /* 悬浮出现的操作按钮 */
        .item-actions {
            position: absolute;
            bottom: 8px;
            right: 8px;
            display: flex;
            gap: 8px;
            background: rgba(255,255,255,0.9);
            padding: 4px 8px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            opacity: 0;
            transform: translateY(5px);
            transition: all 0.2s ease;
        }
        .history-item:hover .item-actions {
            opacity: 1;
            transform: translateY(0);
        }
        .action-btn {
            font-size: 14px;
            cursor: pointer;
            opacity: 0.6;
        }
        .action-btn:hover {
            opacity: 1;
            transform: scale(1.1);
        }

        /* --- 底部状态栏 --- */
        .panel-footer {
            padding: 10px 16px;
            border-top: 1px solid rgba(255, 255, 255, 0.5);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            color: #666;
        }

        .clear-btn {
            cursor: pointer;
            color: #d9534f;
            font-weight: bold;
            transition: opacity 0.2s;
        }
        .clear-btn:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <!-- 悬浮球 -->
    <div id="floating-ball" class="glass" title="展开剪贴板历史">
        📋
    </div>

    <!-- 历史面板 -->
    <div id="history-panel" class="glass">
        <!-- 顶部按住拖拽区 -->
        <div class="panel-header" id="drag-handle">
            <div class="header-left">
                <span>🔍</span>
                <input type="text" class="search-input" placeholder="搜索内容...">
            </div>
            <div class="header-right">
                <span class="icon-btn" id="pin-btn" title="固定面板">📌</span>
                <span class="icon-btn" id="close-btn" title="收起">✖️</span>
            </div>
        </div>

        <!-- 内容列表 -->
        <div class="panel-content">
            <!-- 文本记录 -->
            <div class="history-item">
                <div class="item-header">
                    <span class="item-type">📝 文本</span>
                    <span>刚刚</span>
                </div>
                <div class="item-body">这是一个兼顾美观与实用性的剪贴板历史记录工具 UI/UX 方案设计...</div>
                <div class="item-actions">
                    <span class="action-btn" title="复制">📋</span>
                    <span class="action-btn" title="收藏">⭐</span>
                    <span class="action-btn" title="删除">🗑️</span>
                </div>
            </div>

            <!-- 链接记录 -->
            <div class="history-item">
                <div class="item-header">
                    <span class="item-type">🔗 链接</span>
                    <span>15 分钟前</span>
                </div>
                <div class="item-body" style="color: #0066cc;">https://github.com/your-project/clipboard-ui</div>
                <div class="item-actions">
                    <span class="action-btn" title="复制">📋</span>
                    <span class="action-btn" title="收藏">⭐</span>
                    <span class="action-btn" title="删除">🗑️</span>
                </div>
            </div>

            <!-- 图片记录 -->
            <div class="history-item">
                <div class="item-header">
                    <span class="item-type">🖼️ 图片</span>
                    <span>1 小时前</span>
                </div>
                <div class="item-image-preview">
                    [ 缩略图预览区域 ]
                </div>
                <div class="item-actions">
                    <span class="action-btn" title="复制">📋</span>
                    <span class="action-btn" title="收藏">⭐</span>
                    <span class="action-btn" title="删除">🗑️</span>
                </div>
            </div>

            <!-- 文件记录 -->
            <div class="history-item">
                <div class="item-header">
                    <span class="item-type">📁 文件</span>
                    <span>2 小时前</span>
                </div>
                <div class="item-body"><strong>产品设计规范V2.pdf</strong><br><span style="color:#999; font-size:11px;">2.4 MB</span></div>
                <div class="item-actions">
                    <span class="action-btn" title="复制">📋</span>
                    <span class="action-btn" title="收藏">⭐</span>
                    <span class="action-btn" title="删除">🗑️</span>
                </div>
            </div>
            
            <!-- 占位记录，用于展示滚动条 -->
            <div class="history-item">
                <div class="item-header">
                    <span class="item-type">📝 文本</span>
                    <span>昨天</span>
                </div>
                <div class="item-body">console.log("Hello, Glassmorphism!");</div>
                <div class="item-actions">
                    <span class="action-btn" title="复制">📋</span>
                    <span class="action-btn" title="收藏">⭐</span>
                    <span class="action-btn" title="删除">🗑️</span>
                </div>
            </div>
        </div>

        <!-- 底部 -->
        <div class="panel-footer">
            <span class="icon-btn" title="设置">⚙️</span>
            <span>已记录 45 / 100 条</span>
            <span class="clear-btn">🧹 清空</span>
        </div>
    </div>

    <script>
        const floatingBall = document.getElementById('floating-ball');
        const historyPanel = document.getElementById('history-panel');
        const closeBtn = document.getElementById('close-btn');
        const pinBtn = document.getElementById('pin-btn');
        const dragHandle = document.getElementById('drag-handle');

        let isPinned = false;

        // 1. 展开面板
        floatingBall.addEventListener('click', () => {
            floatingBall.style.opacity = '0';
            floatingBall.style.pointerEvents = 'none';
            historyPanel.classList.add('active');
        });

        // 2. 收起面板
        closeBtn.addEventListener('click', () => {
            historyPanel.classList.remove('active');
            floatingBall.style.opacity = '1';
            floatingBall.style.pointerEvents = 'auto';
        });

        // 3. 固定状态切换
        pinBtn.addEventListener('click', () => {
            isPinned = !isPinned;
            pinBtn.style.color = isPinned ? '#0066cc' : 'inherit';
            pinBtn.style.opacity = isPinned ? '1' : '0.6';
        });

        // 4. 面板拖拽逻辑
        let isDragging = false;
        let startX, startY, initialX, initialY;

        dragHandle.addEventListener('mousedown', (e) => {
            // 防止拖拽时误触搜索框或按钮
            if (e.target.tagName.toLowerCase() === 'input' || e.target.classList.contains('icon-btn')) {
                return;
            }
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            
            // 获取面板当前的坐标
            const rect = historyPanel.getBoundingClientRect();
            initialX = rect.left;
            initialY = rect.top;

            // 移除 bottom/right 约束，改为纯绝对坐标，防止拖拽跳跃
            historyPanel.style.bottom = 'auto';
            historyPanel.style.right = 'auto';
            historyPanel.style.left = `${initialX}px`;
            historyPanel.style.top = `${initialY}px`;
            
            document.body.style.userSelect = 'none'; // 拖拽时防止选中文字
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const dx = e.clientX - startX;
            const dy = e.clientY - startY;
            
            // 实时更新位置
            historyPanel.style.left = `${initialX + dx}px`;
            historyPanel.style.top = `${initialY + dy}px`;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            document.body.style.userSelect = 'auto';
        });

    </script>
</body>
</html>
