<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#1d6fd8" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- 圆形背景 -->
  <circle cx="512" cy="512" r="460" fill="url(#bg)" filter="url(#shadow)"/>

  <!-- 剪贴板主体 -->
  <rect x="312" y="280" width="400" height="480" rx="48" ry="48" fill="#ffffff" opacity="0.95"/>

  <!-- 剪贴板顶部夹子 -->
  <rect x="412" y="200" width="200" height="80" rx="24" ry="24" fill="#ffffff" opacity="0.95"/>
  <rect x="432" y="220" width="160" height="40" rx="16" ry="16" fill="#e8f4fd"/>

  <!-- 内容行 1 -->
  <rect x="372" y="400" width="280" height="32" rx="12" ry="12" fill="#e2e8f0"/>

  <!-- 内容行 2 -->
  <rect x="372" y="464" width="200" height="32" rx="12" ry="12" fill="#e2e8f0"/>

  <!-- 内容行 3 -->
  <rect x="372" y="528" width="240" height="32" rx="12" ry="12" fill="#e2e8f0"/>

  <!-- 高亮标记（右下角小圆点） -->
  <circle cx="720" cy="760" r="64" fill="#ffd93d"/>
  <text x="720" y="780" text-anchor="middle" dominant-baseline="central" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="56" font-weight="700" fill="#ffffff">B</text>
</svg>
